<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smithers Graph Builder</title>
    <style>
      :root {
        --bg: #0b1020;
        --panel: #11182b;
        --panel-2: #17213a;
        --border: #2b3653;
        --text: #ebefff;
        --muted: #9ca8cb;
        --accent: #7c9cff;
        --parallel: #5eead4;
        --loop: #f59e0b;
        --approval: #fb7185;
        --shell: #67e8f9;
        --agent: #c4b5fd;
        --branch: #86efac;
        --shadow: 0 12px 30px rgba(0,0,0,.28);
      }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: Inter, ui-sans-serif, system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); }
      .app { display: grid; grid-template-columns: 280px 1fr 460px; height: 100vh; transition: grid-template-columns .2s ease; }
      .app.right-collapsed { grid-template-columns: 280px 1fr 0px; }
      .app.right-collapsed .panel-right { overflow: hidden; border: 0; padding: 0; width: 0; min-width: 0; }
      .reopen-right { display: none; width: auto; padding: 8px 14px; font-size: 12px; }
      .app.right-collapsed .reopen-right { display: inline-block; }
      .panel { border-right: 1px solid var(--border); background: rgba(17,24,43,.96); display: flex; flex-direction: column; overflow: hidden; }
      .panel:last-child { border-right: 0; }
      .panel-right { position: relative; overflow: auto; }
      .panel-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; }
      .sec { padding: 12px 14px; border-bottom: 1px solid var(--border); }
      .sec-head { display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; }
      .sec-head h2 { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin: 0; }
      .sec-head .arrow { font-size: 12px; color: var(--muted); transition: transform .15s; }
      .sec-head .arrow.open { transform: rotate(90deg); }
      .sec-body { display: none; margin-top: 10px; }
      .sec-body.open { display: block; }
      h1, p { margin: 0; }
      h1 { font-size: 16px; }
      p { color: var(--muted); font-size: 12px; line-height: 1.4; }
      button, input, textarea, select { width: 100%; border: 1px solid var(--border); background: var(--panel-2); color: var(--text); border-radius: 8px; padding: 8px 10px; font: inherit; font-size: 13px; }
      button { cursor: pointer; font-size: 12px; }
      button:hover { border-color: var(--accent); }
      .row { display: flex; gap: 6px; }
      .row > * { flex: 1; }
      .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
      .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
      .chip { display: inline-block; padding: 3px 7px; border-radius: 999px; background: rgba(124,156,255,.15); color: #c8d5ff; font-size: 11px; }
      .badge { display: inline-block; padding: 2px 7px; border-radius: 999px; background: rgba(255,255,255,.06); font-size: 11px; color: var(--muted); }
      .status-inline { font-size: 11px; padding: 6px 10px; border: 1px solid var(--border); border-radius: 8px; background: rgba(255,255,255,.03); margin-top: 8px; }
      .status-inline.warn { border-color: rgba(245,158,11,.35); }
      .recent-btn { font-size: 11px; padding: 5px 8px; text-align: left; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      label { display: block; font-size: 11px; color: var(--muted); margin: 8px 0 4px; }
      .hidden { display: none; }
      .canvas-shell { display: flex; flex-direction: column; min-width: 0; }
      .canvas-bar { display: flex; gap: 6px; align-items: center; padding: 8px 14px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
      .canvas-bar .spacer { flex: 1; }
      .canvas-bar button, .canvas-bar select { width: auto; }
      .canvas { position: relative; overflow: auto; flex: 1; background: linear-gradient(rgba(124,156,255,.06) 1px, transparent 1px), linear-gradient(90deg, rgba(124,156,255,.06) 1px, transparent 1px); background-size: 28px 28px; }
      .canvas-inner { position: relative; transform-origin: 0 0; }
      svg.edges { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
      .edge-label { font-size: 11px; fill: #d9e1ff; }
      #edge-actions { position: absolute; inset: 0; pointer-events: none; }
      .edge-action { position: absolute; width: auto; min-width: 24px; padding: 3px 7px; font-size: 10px; border-radius: 999px; pointer-events: auto; background: rgba(17,24,43,.98); }
      .canvas-shell { position: relative; } /* positioning context for minimap */
      .minimap { position: absolute; right: 12px; bottom: 12px; width: 200px; height: 120px; background: rgba(12,18,34,.92); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; box-shadow: var(--shadow); z-index: 50; pointer-events: none; }
      .minimap svg { width: 100%; height: 100%; display: block; }
      .node { position: absolute; width: 200px; border: 1px solid var(--border); border-radius: 14px; background: rgba(23,33,58,.98); box-shadow: var(--shadow); padding: 10px; cursor: grab; user-select: none; }
      .node.selected { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent) inset, var(--shadow); }
      .node.parallel { border-color: rgba(94,234,212,.4); }
      .node.loop { border-color: rgba(245,158,11,.4); }
      .node.agent { border-color: rgba(196,181,253,.4); }
      .node.shell { border-color: rgba(103,232,249,.4); }
      .node.approval { border-color: rgba(251,113,133,.4); }
      .node.branch { border-color: rgba(134,239,172,.4); }
      .node-head { display: flex; justify-content: space-between; gap: 6px; margin-bottom: 4px; }
      .node-kind { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; }
      .node-kind.parallel { color: var(--parallel); }
      .node-kind.loop { color: var(--loop); }
      .node-kind.agent { color: var(--agent); }
      .node-kind.shell { color: var(--shell); }
      .node-kind.approval { color: var(--approval); }
      .node-kind.branch { color: var(--branch); }
      .node-title { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
      .node-body { font-size: 11px; color: var(--muted); max-height: 52px; overflow: hidden; white-space: pre-wrap; }
      .handles { position: relative; height: 14px; margin-top: 6px; }
      .handle { position: absolute; top: 2px; width: 8px; height: 8px; border-radius: 999px; background: #dce4ff; border: 2px solid #1c2745; }
      .handle.in { left: -15px; }
      .handle.out { right: -15px; }
      .node-toolbar { display: flex; gap: 4px; margin-top: 6px; }
      .node-toolbar button { padding: 4px 6px; font-size: 11px; }
      .mini { font-size: 10px; color: var(--muted); }
      .tabs { display: flex; gap: 6px; margin-bottom: 10px; }
      .tab { font-size: 12px; padding: 6px 10px; }
      .tab.active { border-color: var(--accent); color: white; }
      .split { display: grid; gap: 12px; }
      pre { margin: 0; white-space: pre-wrap; word-break: break-word; padding: 10px; border-radius: 10px; background: #0b1222; border: 1px solid var(--border); font-size: 11px; }
      .footer { font-size: 11px; color: var(--muted); margin-top: 8px; }
    </style>
  </head>
  <body>
    <div class="app" id="app">
      <aside class="panel">
        <div class="sec" style="padding:14px">
          <h1>Smithers Graph Builder</h1>
        </div>
        <div class="panel-scroll">

          <div class="sec" id="sec-file">
            <div class="sec-head" onclick="toggleSec('file')"><h2>File</h2><span class="arrow open" id="arrow-file">›</span></div>
            <div class="sec-body open" id="body-file">
              <div class="row">
                <input id="local-path" placeholder="path or pick file →" style="font-size:12px" />
                <button id="pick-file" style="flex:0 0 auto; width:auto; padding:8px 12px" title="Pick file">📂</button>
              </div>
              <input id="pick-file-input" class="hidden" type="file" accept=".tsx,.ts,.json" />
              <div id="recent-list" style="margin-top:6px"></div>
              <div class="grid2" style="margin-top:6px">
                <button id="load-local">Load</button>
                <button id="reload-local">Reload</button>
                <button id="save-local">Save</button>
                <button id="validate-code">Validate</button>
              </div>
              <label>Render input</label>
              <textarea id="render-input" rows="2" style="font-size:11px">{}</textarea>
            </div>
          </div>

          <div class="sec" id="sec-add">
            <div class="sec-head" onclick="toggleSec('add')"><h2>Add node</h2><span class="arrow open" id="arrow-add">›</span></div>
            <div class="sec-body open" id="body-add">
              <div class="grid3">
                <button data-add="agent">Agent</button>
                <button data-add="shell">Shell</button>
                <button data-add="approval">Approval</button>
                <button data-add="parallel">Parallel</button>
                <button data-add="loop">Loop</button>
                <button data-add="branch">Branch</button>
              </div>
            </div>
          </div>

          <div class="sec" id="sec-export">
            <div class="sec-head" onclick="toggleSec('export')"><h2>Export</h2><span class="arrow" id="arrow-export">›</span></div>
            <div class="sec-body" id="body-export">
              <div class="grid2">
                <button id="export-json">Graph JSON</button>
                <button id="export-code">workflow.tsx</button>
                <button id="upload-graph-btn">Upload JSON</button>
                <button id="upload-tsx-btn">Upload TSX</button>
              </div>
              <input id="upload-graph-input" class="hidden" type="file" accept=".json,.graph.json" />
              <input id="upload-tsx-input" class="hidden" type="file" accept=".tsx,.ts" />
              <button id="load-example" style="margin-top:6px">Load starter template</button>
            </div>
          </div>

          <div class="sec" id="sec-nodes">
            <div class="sec-head" onclick="toggleSec('nodes')"><h2>Nodes</h2><span class="arrow" id="arrow-nodes">›</span></div>
            <div class="sec-body" id="body-nodes">
              <div id="node-list" style="display:grid; gap:4px"></div>
            </div>
          </div>

          <div id="status-area" style="padding:8px 14px"></div>
        </div>
      </aside>

      <main class="canvas-shell">
        <div class="canvas-bar">
          <button id="zoom-out" style="width:32px">−</button>
          <button id="zoom-in" style="width:32px">+</button>
          <button id="fit-view">Fit</button>
          <select id="orientation" style="width:auto">
            <option value="horizontal">Horizontal</option>
            <option value="vertical">Vertical</option>
          </select>
          <span id="zoom-label" class="badge">100%</span>
          <div class="spacer"></div>
          <button id="reopen-right" class="reopen-right">‹ Inspector</button>
        </div>
        <div id="canvas" class="canvas">
          <div id="canvas-inner" class="canvas-inner">
            <svg id="edges" class="edges"></svg>
            <div id="edge-actions"></div>
            <div id="nodes"></div>
          </div>
        </div>
        <div class="minimap"><svg id="minimap"></svg></div>
      </main>

      <aside class="panel panel-right">
        <div class="sec" style="display:flex; align-items:center; gap:8px; padding:10px 14px">
          <button id="toggle-right" title="Collapse" style="position:static; transform:none; flex:0 0 auto; width:28px; height:28px; display:flex; align-items:center; justify-content:center; padding:0; font-size:14px; border-radius:6px">›</button>
          <span class="mini">Inspector</span>
        </div>
        <div class="sec">
          <div class="tabs">
            <button class="tab active" data-tab="inspector">Inspector</button>
            <button class="tab" data-tab="code">Code</button>
            <button class="tab" data-tab="plan">Plan</button>
            <button class="tab" data-tab="graph">Graph JSON</button>
          </div>
          <div id="tab-inspector" class="split"></div>
          <div id="tab-code" class="split" style="display:none"><pre id="code-output"></pre></div>
          <div id="tab-plan" class="split" style="display:none"><pre id="plan-output"></pre></div>
          <div id="tab-graph" class="split" style="display:none"><pre id="graph-output"></pre></div>
        </div>
      </aside>
    </div>

    <script>
      const state = {
        workflowName: 'visual-builder-demo',
        positions: {},
        zoom: 1,
        orientation: 'horizontal',
        localPath: '',
        renderInputJson: '{}',
        sourceInfo: null,
        lastValidation: null,
        statusMessages: [],
        root: {
          id: 'root-sequence', kind: 'sequence', title: 'Main sequence', children: [
            { id: 'plan', kind: 'agent', title: 'Plan task', outputKey: 'plan', schema: 'z.object({ summary: z.string() })', prompt: 'Create an implementation plan for: ${ctx.input.request}' },
            { id: 'decision', kind: 'branch', title: 'Scope decision', condition: 'ctx.input.isLargeChange === true', children: [
              { id: 'decision-true', kind: 'sequence', title: 'If true', children: [ { id: 'deep-review', kind: 'agent', title: 'Deep review', outputKey: 'deepReview', schema: 'z.object({ summary: z.string() })', prompt: 'Review the large-scope plan before implementation.' } ]},
              { id: 'decision-false', kind: 'sequence', title: 'If false', children: [ { id: 'fast-track', kind: 'shell', title: 'Fast-track check', outputKey: 'fastCheck', schema: 'z.object({ ok: z.boolean(), stdout: z.string() })', command: 'bun test' } ]},
            ]},
            { id: 'parallel-docs-tests', kind: 'parallel', title: 'Parallel updates', children: [
              { id: 'update-docs', kind: 'agent', title: 'Update docs', outputKey: 'docsUpdate', schema: 'z.object({ summary: z.string() })', prompt: 'Update the docs for the requested change.' },
              { id: 'run-tests', kind: 'shell', title: 'Run tests', outputKey: 'testResult', schema: 'z.object({ ok: z.boolean(), stdout: z.string() })', command: 'bun test' },
            ]},
            { id: 'review-loop', kind: 'loop', title: 'Review loop', loopId: 'review-loop', maxIterations: 3, children: [
              { id: 'implement', kind: 'agent', title: 'Implement', outputKey: 'implementation', schema: 'z.object({ summary: z.string(), filesChanged: z.array(z.string()) })', prompt: 'Implement the plan and summarize the changes.' },
              { id: 'review', kind: 'approval', title: 'Human review', outputKey: 'reviewDecision', schema: 'z.object({ approved: z.boolean(), note: z.string().nullable(), decidedBy: z.string().nullable(), decidedAt: z.string().nullable() })', message: 'Approve after checking the implementation.' },
            ]},
          ]
        },
        selectedId: 'plan',
        tab: 'inspector',
        drag: null,
      };

      const $ = (s) => document.getElementById(s);
      const nodesEl = $('nodes'), edgeActionsEl = $('edge-actions'), listEl = $('node-list');
      const inspectorEl = $('tab-inspector'), codeOutputEl = $('code-output'), planOutputEl = $('plan-output'), graphOutputEl = $('graph-output');
      const edgesEl = $('edges'), canvasInnerEl = $('canvas-inner'), canvasEl = $('canvas'), zoomLabelEl = $('zoom-label'), minimapEl = $('minimap');
      const statusAreaEl = $('status-area'), localPathEl = $('local-path'), renderInputEl = $('render-input'), orientationEl = $('orientation');
      const uploadGraphInputEl = $('upload-graph-input'), uploadTsxInputEl = $('upload-tsx-input'), pickFileInputEl = $('pick-file-input');

      window.toggleSec = function(id) {
        const body = $('body-' + id), arrow = $('arrow-' + id);
        body.classList.toggle('open');
        arrow.classList.toggle('open');
      }

      const esc = (v) => String(v ?? '').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;');
      const isContainer = (n) => n && ['sequence','parallel','loop','branch'].includes(n.kind);
      const isTaskNode = (n) => n && ['agent','shell','approval'].includes(n.kind);
      function normalizeTask(node) { return { id: String(node.id||'task'), kind: node.kind==='shell'||node.kind==='approval'?node.kind:'agent', title: String(node.title||node.id||'Task'), outputKey: String(node.outputKey||node.id||'output'), schema: String(node.schema||(node.kind==='approval'?'z.object({ approved: z.boolean(), note: z.string().nullable(), decidedBy: z.string().nullable(), decidedAt: z.string().nullable() })':'z.object({ result: z.string() })')), prompt: typeof node.prompt==='string'?node.prompt:undefined, command: typeof node.command==='string'?node.command:undefined, message: typeof node.message==='string'?node.message:undefined }; }
      function normalizeNode(node) { if (isTaskNode(node)) return normalizeTask(node); const kind = node.kind==='parallel'||node.kind==='loop'||node.kind==='branch'?node.kind:'sequence'; const base = { id: String(node.id||`${kind}-1`), kind, title: String(node.title||kind), children: Array.isArray(node.children)?node.children.map(normalizeNode):[] }; if (kind==='loop') { base.loopId = typeof node.loopId==='string'?node.loopId:base.id; base.maxIterations = typeof node.maxIterations==='number'?node.maxIterations:3; } if (kind==='branch') { base.condition = typeof node.condition==='string'?node.condition:'true'; } return base; }
      function applyDocument(doc) { const n = { workflowName: String(doc.workflowName||'workflow'), orientation: doc.orientation==='vertical'?'vertical':'horizontal', positions: typeof doc.positions==='object'&&doc.positions?doc.positions:{}, root: normalizeNode(doc.root||{id:'root-sequence',kind:'sequence',title:'Main',children:[]}) }; state.workflowName=n.workflowName; state.orientation=n.orientation; state.positions=n.positions; state.root=isContainer(n.root)?n.root:{id:'root-sequence',kind:'sequence',title:'Main',children:[n.root]}; state.selectedId=state.root.children[0]?.id||state.root.id; orientationEl.value=state.orientation; }
      function documentModel() { return { version:1, workflowName:state.workflowName, orientation:state.orientation, positions:state.positions, root:state.root }; }
      function walk(node,visitor,parent=null) { visitor(node,parent); for (const child of node.children??[]) walk(child,visitor,node); }
      function findNode(id) { let found=null; walk(state.root,(node,parent)=>{ if(node.id===id) found={node,parent}; }); return found; }
      const selectedEntry=()=>findNode(state.selectedId);
      function selectedContainer() { const e=selectedEntry(); if(!e) return state.root; return isContainer(e.node)?e.node:(e.parent&&isContainer(e.parent)?e.parent:state.root); }
      function depthOf(id) { let d=0; function h(node,c) { if(node.id===id){d=c;return true;} for(const child of node.children??[]) if(h(child,c+1)) return true; return false; } h(state.root,0); return d; }
      function flattenNodes() { const rows=[]; walk(state.root,(node)=>{ if(node.id!==state.root.id) rows.push({id:node.id,kind:node.kind,depth:depthOf(node.id)}); }); return rows; }
      function preview(node) { if(node.kind==='agent') return node.prompt||''; if(node.kind==='shell') return node.command||''; if(node.kind==='approval') return node.message||''; if(node.kind==='loop') return `Loop · maxIter=${node.maxIterations||3}`; if(node.kind==='branch') return `${node.condition||'true'}`; return `${node.children?.length??0} children`; }
      function edgeKind(parent) { if(parent.kind==='parallel') return 'parallel'; if(parent.kind==='loop') return 'loop'; if(parent.kind==='branch') return 'branch'; return 'flow'; }
      function entryLabel(parent,child,index) { if(parent.kind==='parallel') return 'parallel'; if(parent.kind==='loop') return 'step'; if(parent.kind==='branch') return index===0?'true':'false'; if(parent.kind==='sequence') return 'next'; return 'flow'; }

      function buildVisualGraph() {
        const nodes=[],edges=[],W=200,H=105,PRIMARY=160,SECONDARY=170; let edgeId=0;
        function addNode(v) { const o=state.positions[v.id]; if(o){v.x=o.x;v.y=o.y;} nodes.push(v); }
        function addEdge(from,to,label,kind) { edges.push({id:`e-${edgeId++}`,from,to,label,kind}); }
        function layout(node,x,y) {
          addNode({id:node.id,kind:node.kind,title:node.title||node.id,body:preview(node),x,y,w:W,h:H,raw:node});
          if(!node.children?.length) return {width:W,height:H};
          if(node.kind==='parallel'||node.kind==='branch') {
            let maxP=x+W;
            node.children.forEach((child,i)=>{
              const cx=state.orientation==='horizontal'?x+W+PRIMARY:x+i*(W+PRIMARY);
              const cy=state.orientation==='horizontal'?y+(i-(node.children.length-1)/2)*SECONDARY:y+H+PRIMARY;
              const res=layout(child,cx,cy);
              addEdge(node.id,child.id,entryLabel(node,child,i),edgeKind(node));
              maxP=Math.max(maxP,state.orientation==='horizontal'?cx+res.width:cy+res.height);
            });
            return state.orientation==='horizontal'?{width:maxP-x,height:H+PRIMARY+SECONDARY*node.children.length}:{width:W+PRIMARY*node.children.length,height:H+PRIMARY+SECONDARY};
          }
          let cursor=0,prev=null,maxP=state.orientation==='horizontal'?x+W:y+H;
          node.children.forEach((child,i)=>{
            const cx=state.orientation==='horizontal'?x+W+PRIMARY+cursor:x;
            const cy=state.orientation==='horizontal'?y:y+H+PRIMARY+cursor;
            const res=layout(child,cx,cy);
            addEdge(prev??node.id,child.id,prev?'next':entryLabel(node,child,i),edgeKind(node));
            prev=child.id;
            cursor+=(state.orientation==='horizontal'?res.width:res.height)+60;
            maxP=Math.max(maxP,state.orientation==='horizontal'?cx+res.width:cy+res.height);
          });
          if(node.kind==='loop'&&prev) addEdge(prev,node.id,'loop','loop');
          return state.orientation==='horizontal'?{width:maxP-x,height:H}:{width:W,height:maxP-y};
        }
        layout(state.root,60,200);
        const maxX=Math.max(...nodes.map(n=>n.x+n.w))+100;
        const maxY=Math.max(...nodes.map(n=>n.y+n.h))+100;
        return {nodes,edges,width:Math.max(maxX,800),height:Math.max(maxY,600)};
      }

      function outputsAccess(key) { return /^[A-Za-z_$][A-Za-z0-9_$]*$/.test(key)?`outputs.${key}`:`outputs[${JSON.stringify(key)}]`; }
      function quoteObjectKey(key) { return /^[A-Za-z_$][A-Za-z0-9_$]*$/.test(key)?key:JSON.stringify(key); }
      function collectSchemas(node,rows) { if(isTaskNode(node)) rows.set(node.outputKey,node.schema); for(const child of node.children??[]) collectSchemas(child,rows); }
      function subtreeCode(node,level) {
        const pad='  '.repeat(level);
        if(node.kind==='agent') return [`${pad}<Task id="${node.id}" output={${outputsAccess(node.outputKey)}} agent={sharedAgent}>`,`${pad}  {\`${node.prompt||''}\`}`,`${pad}</Task>`].join('\n');
        if(node.kind==='shell') return [`${pad}<Task id="${node.id}" output={${outputsAccess(node.outputKey)}} agent={sharedAgent}>`,`${pad}  {\`Run this shell command and return JSON matching the schema.\\n\\n${node.command||''}\`}`,`${pad}</Task>`].join('\n');
        if(node.kind==='approval') return `${pad}<Approval id="${node.id}" output={${outputsAccess(node.outputKey)}} request={{ title: ${JSON.stringify(node.title)}, summary: ${JSON.stringify(node.message||'')} }} />`;
        if(node.kind==='sequence') return [`${pad}<Sequence>`,...node.children.map(c=>subtreeCode(c,level+1)),`${pad}</Sequence>`].join('\n');
        if(node.kind==='parallel') return [`${pad}<Parallel>`,...node.children.map(c=>subtreeCode(c,level+1)),`${pad}</Parallel>`].join('\n');
        if(node.kind==='loop') return [`${pad}<Ralph id="${node.loopId||node.id}" until={false} maxIterations={${Number(node.maxIterations||3)}}>`,...node.children.map(c=>subtreeCode(c,level+1)),`${pad}</Ralph>`].join('\n');
        if(node.kind==='branch') { const t=node.children[0]?subtreeCode(node.children[0],level+2):`${'  '.repeat(level+2)}<Sequence />`; const f=node.children[1]?subtreeCode(node.children[1],level+2):`${'  '.repeat(level+2)}<Sequence />`; return [`${pad}<Branch`,`${pad}  if={${node.condition||'true'}}`,`${pad}  then={(`,t,`${pad}  )}`,`${pad}  else={(`,f,`${pad}  )}`,`${pad}/>`].join('\n'); }
        return '';

      function generateCode() { const schemas=new Map(); collectSchemas(state.root,schemas); const sl=[...schemas.entries()].map(([k,v])=>`  ${quoteObjectKey(k)}: ${v},`); return ['import { Approval, Branch, CodexAgent, Parallel, Ralph, Sequence, Task, Workflow, createSmithers } from "smithers-orchestrator";','import { z } from "zod";','','const sharedAgent = new CodexAgent({ model: "gpt-5.3-codex" });','','const { smithers, outputs } = createSmithers({', ...sl, '});','',`export default smithers((ctx) => (`,`  <Workflow name="${state.workflowName}">`,subtreeCode(state.root,2),'  </Workflow>','));'].join('\n'); }

      function buildXmlNode(node) { if(isTaskNode(node)) return {kind:'element',tag:'smithers:task',props:{id:node.id},children:[]}; if(node.kind==='sequence') return {kind:'element',tag:'smithers:sequence',props:{},children:node.children.map(buildXmlNode)}; if(node.kind==='parallel') return {kind:'element',tag:'smithers:parallel',props:{},children:node.children.map(buildXmlNode)}; if(node.kind==='loop') return {kind:'element',tag:'smithers:ralph',props:{id:node.loopId||node.id,maxIterations:String(node.maxIterations||3)},children:node.children.map(buildXmlNode)}; if(node.kind==='branch') return {kind:'element',tag:'smithers:branch',props:{if:'true'},children:node.children.map(buildXmlNode)}; return {kind:'element',tag:'smithers:sequence',props:{},children:[]}; }

        const sx=a.x+a.w,sy=a.y+a.h/2,tx=b.x,ty=b.y+b.h/2; const dx=Math.max(60,(tx-sx)/2); if(kind==='loop'){const top=Math.min(sy,ty)-100,cx=Math.max(sx,tx)+80; return `M ${sx} ${sy} C ${cx} ${sy}, ${cx} ${top}, ${tx} ${ty}`;} return `M ${sx} ${sy} C ${sx+dx} ${sy}, ${tx-dx} ${ty}, ${tx} ${ty}`;
      }

      function uniqueId(prefix) { let i=1,id=`${prefix}-${i}`; while(findNode(id)){i++;id=`${prefix}-${i}`;} return id; }
      function makeBranch() { return {id:uniqueId('branch'),kind:'branch',title:'Branch',condition:'true',children:[{id:uniqueId('if-true'),kind:'sequence',title:'If true',children:[makeNode('agent')]},{id:uniqueId('if-false'),kind:'sequence',title:'If false',children:[makeNode('shell')]}]}; }
      function makeNode(kind) {
        if(kind==='agent'){const id=uniqueId('task');return {id,kind,title:'Agent task',outputKey:id,schema:'z.object({ result: z.string() })',prompt:'Describe what this task should do.'};}
        if(kind==='shell'){const id=uniqueId('shell');return {id,kind,title:'Shell step',outputKey:id,schema:'z.object({ ok: z.boolean(), stdout: z.string() })',command:'echo "hello"'};}

        if(kind==='loop') return {id:uniqueId('loop'),kind,title:'Loop',loopId:uniqueId('loop'),maxIterations:3,children:[makeNode('agent'),makeNode('approval')]};
        if(kind==='branch') return makeBranch();
        return {id:uniqueId('sequence'),kind:'sequence',title:'Sequence',children:[makeNode('agent')]};

      function removeNodeFrom(parent,id) { parent.children=parent.children.filter(c=>c.id!==id); for(const child of parent.children) if(child.children) removeNodeFrom(child,id); }
      function findParentOf(id) { let found=null; walk(state.root,node=>{ if((node.children||[]).some(c=>c.id===id)) found=node; }); return found; }

      $('reopen-right').addEventListener('click',toggleRightPanel);
      document.querySelectorAll('[data-tab]').forEach(button=>button.addEventListener('click',()=>{state.tab=button.dataset.tab;document.querySelectorAll('[data-tab]').forEach(b=>b.classList.toggle('active',b===button));$('tab-inspector').style.display=state.tab==='inspector'?'grid':'none';$('tab-code').style.display=state.tab==='code'?'grid':'none';$('tab-plan').style.display=state.tab==='plan'?'grid':'none';$('tab-graph').style.display=state.tab==='graph'?'grid':'none';}));
      document.addEventListener('pointermove',ev=>{if(!state.drag)return;state.positions[state.drag.id]={x:(ev.clientX-state.drag.canvasLeft)/state.zoom-state.drag.dx,y:(ev.clientY-state.drag.canvasTop)/state.zoom-state.drag.dy};renderGraphCanvas();});
      document.addEventListener('pointerup',()=>{if(!state.drag)return;const id=state.drag.id;state.drag=null;state.selectedId=id;render();});
      canvasEl.addEventListener('scroll',()=>renderMinimap(buildVisualGraph()));

      render(); fitView(); loadRecentWorkflows(); setInterval(checkDiskStatus,4000);
    </script>
  </body>
</html>
